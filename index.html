<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">Vin驿 · 公开第二大脑</title>
<meta name="description" content="一个产品经理创业路上的公开思考集">
<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.4/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23bc52ee'/><stop offset='1' stop-color='%233245ff'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><path d='M28 66 L50 34 L72 66' fill='none' stroke='white' stroke-width='9' stroke-linecap='round' stroke-linejoin='round'/><circle cx='50' cy='34' r='8' fill='%234bf3c8'/></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0a0c10;
  --surface:rgba(255,255,255,.045);
  --surface-2:rgba(255,255,255,.07);
  --b:rgba(255,255,255,.10);
  --b-h:rgba(255,255,255,.22);
  --fg:#eef0f9;
  --m:#9aa3b8;
  --m2:#6b7aab;
  --a:#bc52ee;
  --a-2:#4bf3c8;
  --a-3:#3245ff;
  --grad:linear-gradient(135deg,#bc52ee,#3245ff);
  --grad-2:linear-gradient(135deg,#bc52ee,#4bf3c8);
  --a-soft:rgba(188,82,238,.12);
  --a-soft-2:rgba(79,243,200,.10);
  --glow:0 10px 36px rgba(124,58,237,.28);
  --glow-2:0 10px 36px rgba(50,69,255,.22);
  --sans:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --mono:'JetBrains Mono','SFMono-Regular',Menlo,monospace;
  --r:16px;
  --t:.25s cubic-bezier(.4,0,.2,1);
  --sh-sm:0 1px 2px rgba(0,0,0,.3);
  --sh:0 2px 12px rgba(0,0,0,.4);
  --sh-md:0 8px 30px rgba(0,0,0,.5);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--fg);background:var(--bg);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:"cv02","cv03","cv04","cv11"}
::selection{background:var(--a);color:#fff}
a{color:var(--fg);text-decoration:none;transition:all var(--t)}
a:hover{opacity:.85}
img{max-width:100%;height:auto;border-radius:var(--r)}
hr{border:none;border-top:1px solid var(--b);margin:2rem 0}

/* Layout */
.container{max-width:1060px;margin:0 auto;padding:0 24px}

/* Section label */
.sec-label{font-family:var(--mono);font-size:.74rem;font-weight:500;text-transform:uppercase;letter-spacing:.22em;color:var(--a-2);margin-bottom:16px}

/* Nav */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(10,12,16,.6);backdrop-filter:saturate(180%) blur(16px);-webkit-backdrop-filter:saturate(180%) blur(16px);border-bottom:1px solid var(--b)}
.nav-logo{font-weight:700;font-size:1.05rem;color:var(--fg);cursor:pointer;display:flex;align-items:center;gap:10px;letter-spacing:-.2px}
.logo-mark{flex-shrink:0;display:block;filter:drop-shadow(0 2px 8px rgba(124,58,237,.45))}
.nav-links{display:flex;gap:28px;font-size:.9rem;font-family:var(--mono)}
.nav-links a{color:var(--m);transition:color var(--t);cursor:pointer;padding:4px 0;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--fg)}

/* Hero */
.hero{position:relative;padding:64px 24px 40px;max-width:860px;margin:0 auto}
.hero-top{display:flex;align-items:center;gap:20px;margin-bottom:22px}
.hero-avatar{width:72px;height:72px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.7rem;font-weight:700;flex-shrink:0;box-shadow:0 0 0 4px var(--bg),0 0 0 5px var(--b)}
.hero-text h1{font-size:2.4rem;font-weight:800;letter-spacing:-.5px;line-height:1.15;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-text .tagline{color:var(--m);font-size:1rem;margin-top:4px;font-family:var(--mono);letter-spacing:.02em}
.hero-bio{color:var(--m2);font-size:1rem;line-height:1.65;margin-bottom:0;max-width:600px}

/* Social */
.social-row{display:flex;gap:8px;flex-wrap:wrap;margin:32px 0 0}
.social-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;font-size:.85rem;border:1px solid var(--b);background:var(--surface);color:var(--fg);cursor:pointer;transition:all var(--t);font-family:var(--sans);font-weight:500;box-shadow:var(--sh-sm);backdrop-filter:blur(8px);text-decoration:none}
.social-btn:hover{border-color:var(--a);color:#fff;box-shadow:var(--glow);text-decoration:none;transform:translateY(-1px)}
.social-btn:hover svg{transform:scale(1.1)}
.social-btn svg{width:18px;height:18px;flex-shrink:0;transition:transform var(--t)}

/* Skills */
.skills-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:20px}
.skill-pill{padding:4px 11px;border-radius:999px;font-size:.76rem;font-weight:500;background:var(--surface);color:var(--m);border:1px solid var(--b);transition:all var(--t);font-family:var(--mono)}
.skill-pill:hover{border-color:var(--a-2);color:var(--fg);transform:translateY(-1px);box-shadow:var(--glow-2)}

/* section title */
.section-title{font-family:var(--mono);font-size:.74rem;font-weight:600;text-transform:uppercase;letter-spacing:.22em;color:var(--a-2);margin-bottom:24px;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--b),transparent)}
.section-title svg{width:18px;height:18px;color:var(--a)}

/* Now */
.now-section{padding:48px 0;max-width:1060px;margin:0 auto}
.now-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.now-item{display:flex;gap:10px;padding:18px 22px;background:var(--surface);border:1px solid var(--b);border-radius:var(--r);font-size:.9rem;color:var(--fg);line-height:1.55;transition:all var(--t);box-shadow:var(--sh-sm);backdrop-filter:blur(8px)}
.now-item:hover{box-shadow:var(--glow);transform:translateY(-2px);border-color:var(--b-h)}
.now-item .emoji{flex-shrink:0;width:22px;text-align:center;font-size:1rem}

/* Projects */
.projects-section{padding:48px 0;max-width:1060px;margin:0 auto}
.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
@media(max-width:640px){.project-grid{grid-template-columns:1fr}}
.project-card{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:24px;transition:all var(--t);cursor:default;box-shadow:var(--sh-sm);backdrop-filter:blur(8px);overflow:hidden}
.project-card:hover{box-shadow:var(--glow);transform:translateY(-3px);border-color:var(--a)}
.project-card .p-title{font-size:1rem;font-weight:600;margin-bottom:6px;color:var(--fg);letter-spacing:-.1px}
.project-card .p-desc{font-size:.86rem;color:var(--m2);line-height:1.55;margin-bottom:14px}
.project-card .p-tags{display:flex;gap:6px;flex-wrap:wrap}
.project-card .p-tags span{padding:2px 8px;border-radius:999px;font-size:.7rem;background:var(--a-soft);color:var(--a-2);font-weight:500;font-family:var(--mono)}

/* Notes mini */
.notes-section{padding:48px 0;max-width:1060px;margin:0 auto}
.notes-mini-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.note-mini-item{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:22px;cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:all var(--t);box-shadow:var(--sh-sm);backdrop-filter:blur(8px)}
.note-mini-item:hover{box-shadow:var(--glow);transform:translateY(-2px);border-color:var(--a)}
.nm-left{flex:1;min-width:0}
.nm-title{font-size:.96rem;font-weight:600;display:block;margin-bottom:4px;color:var(--fg);letter-spacing:-.1px}
.nm-meta{font-size:.72rem;color:var(--m2);display:flex;align-items:center;gap:10px;flex-wrap:wrap;font-family:var(--mono)}
.nm-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.nm-tags .tag-mini{padding:2px 8px;border-radius:999px;font-size:.68rem;background:var(--a-soft);color:var(--a-2);font-weight:500;font-family:var(--mono)}
.nm-summary{font-size:.84rem;color:var(--m2);margin-top:5px;line-height:1.55}
.view-all{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:.86rem;color:var(--a-2);cursor:pointer;font-weight:600;transition:gap var(--t);font-family:var(--mono)}
.view-all::after{content:'→';transition:transform var(--t)}
.view-all:hover{gap:10px;color:#fff;opacity:.85}
.view-all:hover::after{transform:translateX(3px)}

/* Contact */
.contact-section{padding:48px 0 32px;max-width:1060px;margin:0 auto}
.contact-section h2{font-size:1.4rem;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.contact-section p{color:var(--m);font-size:.92rem;margin-bottom:20px}
.contact-section .cta-btn{position:relative;font-size:.92rem;padding:11px 24px;background:var(--grad);color:#fff;font-weight:600;box-shadow:var(--glow);border:none}
.contact-section .cta-btn::after{content:'→';margin-left:6px;transition:transform var(--t)}
.contact-section .cta-btn:hover{opacity:.92;transform:translateY(-2px);box-shadow:var(--glow-2)}
.contact-section .cta-btn:hover::after{transform:translateX(4px)}

/* Notes list */
.notes-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.note-item{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:22px;cursor:pointer;transition:all var(--t);box-shadow:var(--sh-sm);backdrop-filter:blur(8px)}
.note-item:hover{box-shadow:var(--glow);transform:translateY(-2px);border-color:var(--a)}
.note-item .title{font-size:1.02rem;font-weight:600;color:var(--fg);margin-bottom:6px;letter-spacing:-.2px}
.note-item .meta{font-size:.74rem;color:var(--m2);display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-family:var(--mono)}
.note-item .tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:999px;font-size:.7rem;background:var(--a-soft);color:var(--a-2);font-weight:500;font-family:var(--mono)}
.note-item .summary{font-size:.85rem;color:var(--m2);margin-top:8px;line-height:1.6}

/* Note detail */
.note-detail{position:relative;padding:48px 0 96px;max-width:760px;margin:0 auto}
.note-detail .back{display:inline-flex;align-items:center;gap:6px;color:var(--m);font-size:.86rem;margin-bottom:32px;cursor:pointer;transition:color var(--t);font-weight:500;font-family:var(--mono)}
.note-detail .back:hover{color:var(--fg)}
.note-detail .nd-title{font-size:2rem;font-weight:800;margin-bottom:14px;letter-spacing:-.5px;line-height:1.15;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.note-detail .meta{font-size:.76rem;color:var(--m2);margin-bottom:36px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--b);font-family:var(--mono)}
.note-detail .content{font-size:1.05rem;line-height:1.75;color:var(--fg)}
.note-detail .content p{margin-bottom:1.2em}
.note-detail .content h2{font-size:1.4rem;font-weight:700;margin:1.8em 0 .8em;letter-spacing:-.3px;padding-top:.2em;display:flex;align-items:center;gap:10px;padding-bottom:8px;border-bottom:1px solid var(--b)}
.note-detail .content h2::before{content:'';width:6px;height:18px;background:var(--grad);border-radius:3px}
.note-detail .content h3{font-size:1.15rem;font-weight:600;margin:1.5em 0 .6em}
.note-detail .content ul,.note-detail .content ol{padding-left:1.5em;margin-bottom:1.2em}
.note-detail .content li{margin-bottom:.35em}
.note-detail .content blockquote{border-left:3px solid var(--a);padding:12px 20px;margin:1.3em 0;border-radius:0 var(--r) var(--r) 0;color:var(--m);background:var(--surface);border:1px solid var(--b);border-left-color:var(--a)}
.note-detail .content code{font-family:var(--mono);font-size:.86em;background:rgba(188,82,238,.14);padding:2px 7px;border-radius:6px;color:#e9d5ff}
.note-detail .content pre{background:#0d1117;padding:18px;border-radius:var(--r);overflow-x:auto;margin:1.3em 0;border:1px solid var(--b);font-size:.86rem}
.note-detail .content pre code{background:none;padding:0;display:block;color:#c9d1d9;border:none}
.note-detail .content a{color:var(--a-2);text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--b)}
.note-detail .content img{border-radius:var(--r);margin:1em 0;border:1px solid var(--b)}

/* Search & filter */
.page-header{margin-bottom:32px}
.page-header h1{font-size:1.6rem;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.page-header .sub{color:var(--m);font-size:.86rem;margin-top:4px;font-family:var(--mono)}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap::before{content:'⌕';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--m);font-size:1rem;pointer-events:none}
.search-wrap input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--b);border-radius:var(--r);font-family:var(--sans);font-size:.9rem;color:var(--fg);outline:none;transition:all var(--t);background:var(--surface);box-shadow:var(--sh-sm);backdrop-filter:blur(8px)}
.search-wrap input::placeholder{color:var(--m2)}
.search-wrap input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a-soft),var(--sh)}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-bar .filter-btn{padding:5px 12px;border-radius:var(--r);font-size:.78rem;border:1px solid var(--b);background:var(--surface);color:var(--m);cursor:pointer;transition:all var(--t);font-family:var(--mono);font-weight:500;box-shadow:var(--sh-sm)}
.filter-bar .filter-btn:hover{border-color:var(--b-h);color:var(--fg);box-shadow:var(--sh)}
.filter-bar .filter-btn.active{border-color:var(--a);color:var(--a-2);background:var(--a-soft)}

/* About */
.about-page{position:relative;padding:44px 0 96px;max-width:720px;margin:0 auto}
.about-hero{display:flex;align-items:center;gap:18px;padding:26px 28px;border:1px solid var(--b);border-radius:var(--r);background:var(--surface);box-shadow:var(--sh);margin-bottom:22px;backdrop-filter:blur(8px)}
.about-avatar{width:60px;height:60px;border-radius:50%;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.5rem;font-weight:700;flex-shrink:0;box-shadow:0 0 0 4px var(--bg),0 0 0 5px var(--b)}
.about-name{font-size:1.8rem;font-weight:800;letter-spacing:-.5px;line-height:1.1;background:var(--grad);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin:0}
.about-tag{color:var(--m);font-size:.95rem;margin-top:6px;font-family:var(--mono)}
.about-card{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);box-shadow:var(--sh);padding:32px 36px;backdrop-filter:blur(8px)}
.about-card .content{line-height:1.8;font-size:1.02rem;color:var(--fg)}
.about-card .content p{margin-bottom:1.15em}
.about-card .content h1{font-size:1.5rem;font-weight:800;margin:0 0 18px;letter-spacing:-.3px}
.about-card .content h2{font-size:1.1rem;font-weight:700;margin:28px 0 10px;padding-left:12px;border-left:3px solid var(--a);letter-spacing:-.2px}
.about-card .content ul{margin:0 0 1.15em;padding-left:0;list-style:none}
.about-card .content li{position:relative;padding-left:22px;margin-bottom:9px;color:var(--m2)}
.about-card .content li::before{content:'';position:absolute;left:4px;top:9px;width:6px;height:6px;border-radius:50%;background:var(--grad)}
.about-card .content a{color:var(--a-2);text-decoration:none;border-bottom:1px solid var(--a-soft)}
.about-card .content a:hover{color:var(--a)}
.about-card .content strong{color:var(--fg);font-weight:700}
.about-card .content em{color:var(--m2)}
.about-card .content hr{border:none;border-top:1px solid var(--b);margin:26px 0}
.about-card .content blockquote{margin:0 0 1.15em;padding:12px 16px;border-left:3px solid var(--a-soft);background:var(--surface);border-radius:0 10px 10px 0;color:var(--m2)}
.about-contact{margin-top:26px;text-align:center}
.about-contact .section-title{justify-content:center;margin-bottom:16px}
.about-contact .social-row{justify-content:center}

/* Footer */
footer{text-align:center;padding:48px 24px;color:var(--m);font-size:.8rem;margin-top:48px;border-top:1px solid var(--b);font-family:var(--mono)}

/* Loading & empty */
.loading,.empty{text-align:center;padding:80px 24px;color:var(--m);font-size:.88rem}

/* Entrance */
#app{animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){#app{animation:none}}

/* Responsive */
@media(max-width:640px){
  nav{padding:12px 16px}
  .hero{padding:40px 16px 28px}
  .hero-text h1{font-size:1.6rem}
  .hero-avatar{width:56px;height:56px;font-size:1.4rem}
  .note-detail .nd-title{font-size:1.5rem}
  .note-detail{padding:28px 0 56px}
}

/* === 背景装饰（astro 色系） === */
.bg-deco{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(90px);opacity:.45;animation:blobFloat 20s ease-in-out infinite}
.bg-blob-1{width:520px;height:520px;top:-160px;left:-120px;background:radial-gradient(circle,rgba(188,82,238,.40),transparent 70%)}
.bg-blob-2{width:480px;height:480px;top:30%;right:-160px;background:radial-gradient(circle,rgba(50,69,255,.34),transparent 70%);animation-delay:-7s}
.bg-blob-3{width:420px;height:420px;bottom:-140px;left:30%;background:radial-gradient(circle,rgba(79,243,200,.22),transparent 70%);animation-delay:-13s}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 80%)}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.05)}66%{transform:translate(-30px,30px) scale(.95)}}

/* === 装饰 SVG 组件 === */
.deco-svg{width:1em;height:1em;display:inline-block;vertical-align:-.15em}

/* === 项目封面 === */
.p-cover{height:140px;border-radius:12px 12px 0 0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:-20px -20px 16px}
.p-cover svg{width:60%;height:60%;opacity:.85;transition:transform .5s ease}
.project-card:hover .p-cover svg{transform:scale(1.1) rotate(-3deg)}
.p-cover.c1{background:linear-gradient(135deg,#bc52ee,#3245ff)}
.p-cover.c2{background:linear-gradient(135deg,#3245ff,#4bf3c8)}
.p-cover.c3{background:linear-gradient(135deg,#4bf3c8,#38bdf8)}
.p-cover.c4{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.p-cover.c5{background:linear-gradient(135deg,#ec4899,#8b5cf6)}

/* === 笔记卡片封面 === */
.nm-cover{width:88px;height:88px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:var(--grad);box-shadow:var(--glow)}
.nm-cover svg{width:48px;height:48px;color:#fff;opacity:.9}
.note-mini-item:hover .nm-cover{transform:scale(1.05) rotate(-2deg);transition:transform .3s ease}

/* === Hero 装饰 === */
.hero-avatar{position:relative}
.hero-avatar::before{content:'';position:absolute;inset:-8px;border-radius:50%;background:conic-gradient(from 0deg,var(--a),var(--a-3),var(--a-2),var(--a));z-index:-1;opacity:.5;filter:blur(8px);animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* === 按钮加 SVG 箭头 === */
.cta-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:10px;background:var(--grad);color:#fff;font-weight:600;font-size:.92rem;text-decoration:none;box-shadow:var(--glow);transition:all .3s ease}
.cta-btn:hover{transform:translateY(-2px);box-shadow:var(--glow-2)}
.cta-btn svg{width:16px;height:16px;transition:transform .3s ease}
.cta-btn:hover svg{transform:translateX(3px)}

.ai-news-section{padding:48px 0;max-width:1060px;margin:0 auto}
.ai-badge{display:inline-flex;align-items:center;gap:8px;font-family:var(--mono);font-size:.72rem;color:var(--a-2);background:var(--a-soft-2);border:1px solid var(--b);border-radius:999px;padding:4px 12px;margin-bottom:18px}

.ai-news-item .ai-issue-title{font-size:1.12rem;margin:2px 0 8px}
.ai-issue-card{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:24px;box-shadow:var(--sh-sm);backdrop-filter:blur(8px)}
.ai-issue-head{display:flex;gap:12px;align-items:center;margin-bottom:6px}
.ai-issue-no{font-family:var(--mono);font-size:.8rem;color:var(--a);font-weight:600;letter-spacing:.04em}
.ai-issue-date{font-size:.78rem;color:var(--m)}
.ai-issue-title{font-size:1.25rem;margin:2px 0 10px}

.ai-issue-list{display:flex;flex-direction:column;gap:16px}
.ai-issue-item{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:20px;box-shadow:var(--sh-sm);backdrop-filter:blur(8px);cursor:pointer;transition:all var(--t)}
.ai-issue-item:hover{box-shadow:var(--glow);transform:translateY(-2px);border-color:var(--a)}

.ai-issue-report h3{font-size:.98rem;margin:14px 0 6px;color:var(--fg)}
.ai-issue-report ul{margin:8px 0;padding-left:20px}
.ai-issue-report li{margin:5px 0}
.ai-issue-report strong{color:var(--a-2)}
.ai-sources{margin-top:26px;padding-top:16px;border-top:1px solid var(--b)}
.ai-sources-title{font-family:var(--mono);font-size:.72rem;color:var(--m);margin-bottom:10px;letter-spacing:.12em;text-transform:uppercase}

/* 每日一句 名言横幅 */
.quote-banner{
  position:relative;max-width:860px;margin:18px auto 0;padding:22px 28px 20px;
  border:1px solid var(--b);border-radius:var(--r);
  background:linear-gradient(135deg,var(--a-soft),var(--a-soft-2));
  backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);box-shadow:var(--sh);overflow:hidden;
  animation:quoteIn .7s cubic-bezier(.4,0,.2,1) both;
}
.quote-banner::after{
  content:'';position:absolute;top:0;left:0;right:0;height:2px;
  background:linear-gradient(90deg,var(--a),var(--a-2),var(--a-3));
  background-size:200% 100%;animation:quoteBar 4s linear infinite;
}
.quote-banner::before{
  content:'';position:absolute;inset:0;pointer-events:none;
  background:linear-gradient(120deg,transparent 32%,rgba(255,255,255,.07) 50%,transparent 68%);
  transform:translateX(-100%);animation:quoteShine 5s ease-in-out infinite;
}
.quote-mark{font-family:var(--mono);font-size:2.6rem;line-height:.55;color:var(--a);opacity:.45;font-weight:700;user-select:none}
.quote-text{position:relative;font-size:1.18rem;line-height:1.7;font-weight:500;margin:8px 0 12px;color:var(--fg)}
.quote-text.swapping{animation:quoteOut .3s ease forwards}
.quote-text.in{animation:quoteIn2 .4s ease both}
.quote-author{position:relative;font-family:var(--mono);font-size:.86rem;letter-spacing:.04em;color:var(--a-2);text-align:right}
.quote-author b{color:var(--fg);font-weight:600}
.quote-refresh{
  position:absolute;top:13px;right:13px;z-index:2;width:30px;height:30px;border-radius:9px;
  border:1px solid var(--b);background:var(--surface);color:var(--m);cursor:pointer;
  display:flex;align-items:center;justify-content:center;font-size:.95rem;transition:all var(--t);
}
.quote-refresh:hover{color:var(--fg);border-color:var(--b-h);background:var(--surface-2);transform:rotate(90deg)}
@keyframes quoteIn{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
@keyframes quoteIn2{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes quoteOut{to{opacity:0;transform:translateY(-8px)}}
@keyframes quoteShine{0%{transform:translateX(-100%)}55%,100%{transform:translateX(100%)}}
@keyframes quoteBar{0%{background-position:0% 0}100%{background-position:200% 0}}
@media(max-width:600px){.quote-banner{padding:18px 18px 16px}.quote-text{font-size:1.04rem}.quote-refresh{top:10px;right:10px}}

<script>
// --- Site Context ---
const C = {
  notes: [],
  allTags: [],
  currentView: 'home',
  currentTag: null,
  searchQuery: '',
  cfg: typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG : {},
};
// Sync title from config
if (C.cfg.title) document.title = C.cfg.title;
const CDN_MARKED = typeof marked !== 'undefined';

// --- Navigation ---
function showView(view, data) {
  C.currentView = view;
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const m = { home:'nav-home', notes:'nav-notes', about:'nav-about', note:'nav-notes', ainews:'nav-ainews' };
  const el = document.getElementById(m[view]);
  if (el) el.classList.add('active');
  if (view === 'home') renderHome();
  else if (view === 'notes') renderNotesList();
  else if (view === 'note') renderNote(data);
  else if (view === 'about') renderAbout();
  else if (view === 'ainews') renderAiNews();
  return false;
}

// --- Markdown ---
function parseMD(text) {
  const meta = {};
  const body = text.replace(/^---\n([\s\S]*?)\n---\n?/, (_, fm) => {
    fm.split('\n').forEach(l => { const m=l.match(/^(\w+):\s*(.+)/); if(m) meta[m[1].trim()]=m[2].trim(); });
    return '';
  });
  if (meta.tags) meta.tags = meta.tags.split(/[,，\s]+/).filter(Boolean);
  else meta.tags = [];
  if (!meta.title) { const h1 = body.match(/^\s*#\s+(.+?)\s*$/m); meta.title = h1 ? h1[1].replace(/[#*`>]/g,'').trim() : '无标题'; }
  const html = CDN_MARKED ? marked.parse(body) : '<p>'+body.replace(/\n/g,'<br>')+'</p>';
  return { meta, html, body };
}

// --- Load Notes ---
async function loadNotes() {
  try {
    const r = await fetch(C.cfg.contentDir+'/index.json');
    if (!r.ok) throw Error('no index');
    const files = await r.json();
    C.notes = [];
    for (const f of files) {
      const res = await fetch(C.cfg.contentDir+'/'+f.file);
      if (!res.ok) continue;
      const raw = await res.text();
      const { meta, html, body } = parseMD(raw);
      if (meta.draft === 'true') continue;
      const summary = body.replace(/[#*`\[\]]/g,'').trim().slice(0,120);
      C.notes.push({ file: f.file, meta, html, summary });
    }
    C.notes.sort((a,b) => (a.meta.date||'').localeCompare(b.meta.date||'') * -1);
    const s = new Set();
    C.notes.forEach(n => n.meta.tags.forEach(t => s.add(t)));
    C.allTags = [...s].sort();
    renderHome();
    setupHash();
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="empty">还没有笔记。把 .md 放进 content/，然后跑：<br><code style="font-size:0.85rem">python3 build-index.py</code></div>';
  }
}

function setupHash() {
  const h = location.hash.slice(1);
  if (h.startsWith('note=')) {
    const file = decodeURIComponent(h.slice(5));
    const note = C.notes.find(n => n.file === file);
    if (note) showView('note', note);
  } else if (h === 'about') showView('about');
  else if (h === 'notes') showView('notes');
  else if (h === 'ainews') showView('ainews');
}

// 生成社交按钮 HTML（首页与关于页复用）
function genSocialBtns() {
  const cfg = C.cfg;
  return Object.entries(cfg.social).filter(([,v]) => v.url || v.qr || v.id).map(([k,v]) => {
    if (v.id && !v.url && !v.qr)
      return `<a class="social-btn" href="#" onclick="return copyId('${v.id}','${(v.hint||'').replace(/'/g,"\\'")}')">${SOCIAL_ICONS[k]||''}<span>${v.label}</span></a>`;
    const href = v.url || v.qr;
    const blank = href.startsWith('mailto:') ? '' : ' target="_blank" rel="noopener"';
    return `<a class="social-btn" href="${href}"${blank}>${SOCIAL_ICONS[k]||''}<span>${v.label}</span></a>`;
  }).join('');
}

// --- 每日一句 名言横幅 ---
let _lastQuoteIdx = -1;
function pickQuote(qs){
  if(!qs || !qs.length) return null;
  if(qs.length === 1) return { q: qs[0], i: 0 };
  let i; do { i = Math.floor(Math.random() * qs.length); } while(i === _lastQuoteIdx);
  _lastQuoteIdx = i; return { q: qs[i], i };
}
function quoteBannerHtml(){
  const qs = (C.cfg && C.cfg.quotes) || [];
  if(!qs.length) return '';
  const { q } = pickQuote(qs);
  return `<div class="quote-banner" id="quoteBanner">
    <button class="quote-refresh" title="换一句" onclick="return refreshQuote()">↻</button>
    <div class="quote-mark">“</div>
    <div class="quote-text" id="quoteText">${escHtml(q.text)}</div>
    <div class="quote-author">— <b id="quoteAuthor">${escHtml(q.author || '佚名')}</b></div>
  </div>`;
}
function refreshQuote(){
  const qs = (C.cfg && C.cfg.quotes) || [];
  if(!qs.length) return false;
  const el = document.getElementById('quoteText');
  if(!el) return false;
  el.classList.add('swapping');
  setTimeout(() => {
    const { q } = pickQuote(qs);
    const e2 = document.getElementById('quoteText');
    const a2 = document.getElementById('quoteAuthor');
    if(e2){ e2.textContent = q.text; e2.classList.remove('swapping'); e2.classList.add('in'); setTimeout(() => e2.classList.remove('in'), 420); }
    if(a2) a2.textContent = q.author || '佚名';
  }, 300);
  return false;
}

  app.innerHTML = `

      <div class="hero-top">

    <div class="contact-section container">

// --- Render: Notes List ---
function renderNotesList() {
  const app = document.getElementById('app');
  let filtered = [...C.notes];
  if (C.currentTag) filtered = filtered.filter(n => n.meta.tags.includes(C.currentTag));
  if (C.searchQuery) {
    const q = C.searchQuery.toLowerCase();
    filtered = filtered.filter(n =>
      n.meta.title.toLowerCase().includes(q) || n.summary.toLowerCase().includes(q) ||
      n.meta.tags.some(t => t.toLowerCase().includes(q))
    );
  }

  const tagBtns = C.allTags.map(t =>
    `<button class="filter-btn${C.currentTag===t?' active':''}" onclick="toggleTag('${t}')">${t}</button>`
  ).join('');
  const clearBtn = C.currentTag ? `<button class="filter-btn" onclick="toggleTag(null)" style="color:var(--p)">× 清除</button>` : '';

  const items = filtered.length ? filtered.map(n => {
    const tags = n.meta.tags.map(t => `<span class="tag">${t}</span>`).join(' ');
    return `<li class="note-item" onclick="return showView('note', C.notes.find(x=>x.file==='${n.file}'))">
      <div class="title">${escHtml(n.meta.title)}</div>
      <div class="meta"><span>${n.meta.date||''}</span>${tags ? '<span class="tags">'+tags+'</span>' : ''}</div>
      <div class="summary">${escHtml(n.summary)}${n.summary.length>=120?'...':''}</div>
    </li>`;
  }).join('') : '<div class="empty">没有匹配的笔记</div>';

  app.innerHTML = `<div class="container" style="padding-top:40px;padding-bottom:80px">
    <div class="page-header">
      <h1>全部笔记</h1>
      <div class="sub">共 ${C.notes.length} 篇${C.currentTag ? ' · 筛选: '+C.currentTag : ''}</div>
    </div>
    <div class="search-wrap"><input id="search-input" placeholder="搜索笔记..." value="${escHtml(C.searchQuery)}" oninput="onSearch(this.value)"></div>
    ${tagBtns || clearBtn ? `<div class="filter-bar">${tagBtns} ${clearBtn}</div>` : ''}
    <ul class="notes-list">${items}</ul>
  </div>`;
  document.getElementById('search-input')?.focus();
  setHash('notes');
}

function toggleTag(tag) {
  C.currentTag = (C.currentTag === tag) ? null : tag;
  if (C.currentView === 'notes') renderNotesList();
  else renderHome();
}

function onSearch(q) {
  C.searchQuery = q;
  renderNotesList();
}

// --- Render: Note Detail ---
function renderNote(note) {
  if (!note) return showView('notes');
  const app = document.getElementById('app');
  const tags = note.meta.tags.map(t => `<span class="tag">${t}</span>`).join(' ');
  app.innerHTML = `<div class="container">
    <div class="note-detail">
      <a class="back" onclick="return showView('notes')">← 返回笔记列表</a>
      <div class="nd-title">${escHtml(note.meta.title)}</div>
      <div class="meta"><span>${note.meta.date||''}</span>${tags ? '<span class="tags">'+tags+'</span>' : ''}</div>
      <div class="content">${note.html}</div>
    </div>
  </div>`;
  setHash('note='+encodeURIComponent(note.file));
  window.scrollTo(0, 0);
}

// --- Render: AI 速报（期刊列表） ---
function renderAiNews() {
  const app = document.getElementById('app');
  const data = C.aiNews || { issues: [] };
  const updated = data.updated ? fmtCn(data.updated) : '';
  const issues = aiIssues().slice().sort((a,b)=>b.issue-a.issue);
  const list = issues.length ? issues.map(it => `
    <div class="ai-issue-item" onclick="return showIssue(${it.issue})">
      <div class="ai-issue-head"><span class="ai-issue-no">第 ${it.issue} 期</span><span class="ai-issue-date">${escHtml(it.date||'')}</span></div>
      <h3 class="ai-issue-title">${escHtml(it.title||'AI 行业日报')}</h3>
      <div class="ai-issue-digest">${escHtml(it.digest||'')}</div>
      <span class="ai-link">阅读全文 →</span>
    </div>`).join('') : '<div class="empty">暂时没有速报，稍后再来看看～</div>';
  app.innerHTML = `<div class="container" style="padding-top:40px;padding-bottom:80px">
    <div class="page-header">
      <h1>AI 速报</h1>
      <div class="sub">每日自动生成的 AI 行业报告${updated ? ' · 更新于 '+updated : ''}</div>
    </div>
    <div class="ai-issue-list">${list}</div>
  </div>`;
  setHash('ainews');
  window.scrollTo(0,0);
}

function showIssue(n) {
  const app = document.getElementById('app');
  const it = aiIssues().find(x => x.issue === n);
  if (!it) return renderAiNews();
  const sources = (it.sources||[]).length ? `<div class="ai-sources"><div class="ai-sources-title">本期来源</div>${it.sources.map(s=>`<a class="ai-src" href="${escHtml(s.url)}" target="_blank" rel="noopener">${escHtml(s.source||s.title||'来源')} ↗</a>`).join('')}</div>` : '';
  let body;
  if (it.sections && it.sections.length) {
    body = it.sections.map(sec => {
      const items = (sec.items||[]).map(a=>`
        <div class="ai-cat-item">
          <div class="ai-cat-item-title">${escHtml(a.title||'')}</div>
          <div class="ai-cat-item-desc">${escHtml(a.desc||'')}</div>
          ${a.url?`<a class="ai-cat-item-src" href="${escHtml(a.url)}" target="_blank" rel="noopener">${escHtml(a.source||'来源')}${a.date?' · '+escHtml(a.date):''} ↗</a>`:''}
        </div>`).join('');
      return `<section class="ai-cat">
        <h2 class="ai-cat-head">${sec.icon?sec.icon+' ':''}${escHtml(sec.label||'')}</h2>
        ${sec.summary?`<p class="ai-cat-summary">${escHtml(sec.summary)}</p>`:''}
        ${items}
      </section>`;
    }).join('');
  } else {
    body = `<div class="ai-issue-report markdown-body">${marked.parse(it.report||'')}</div>`;
  }
  app.innerHTML = `<div class="container" style="padding-top:40px;padding-bottom:80px">
    <a class="view-all" onclick="return renderAiNews()">← 返回期刊列表</a>
    <div class="page-header">
      <div class="ai-issue-head"><span class="ai-issue-no">第 ${it.issue} 期</span><span class="ai-issue-date">${escHtml(it.date||'')}</span></div>
      <h1>${escHtml(it.title||'AI 行业日报')}</h1>
      <div class="ai-issue-digest">${escHtml(it.digest||'')}</div>
    </div>
    ${body}
    ${sources}
  </div>`;
  setHash('ainews');
  window.scrollTo(0,0);
}

function fmtCn(iso){
  try { return new Date(iso).toLocaleString('zh-CN',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'}); } catch(e){ return ''; }
}

// --- AI 速报 helpers ---
function aiIssues(){ return (C.aiNews && C.aiNews.issues) || []; }

async function loadAiNews() {
  const apply = () => { if (C.currentView==='home') renderHome(); else if (C.currentView==='ainews') renderAiNews(); };
  try {
    const r = await fetch('ai-news.json?t='+Date.now());
    if (r.ok) { C.aiNews = await r.json(); apply(); }
  } catch(e){}
  // 尝试拉取 GitHub raw 上由后台任务每 4 小时刷新的最新版（CN 网络可达时生效）
  try {
    const r2 = await fetch('https://raw.githubusercontent.com/HTTP803/vincent-blog/main/ai-news.json?t='+Date.now());
    if (r2.ok) {
      const d2 = await r2.json();
      if (!C.aiNews || (d2.updated||'') >= (C.aiNews.updated||'')) { C.aiNews = d2; apply(); }
    }
  } catch(e){}
}

// --- Util ---
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Init ---
document.getElementById('footer-year').textContent = new Date().getFullYear();

// 复制账号（email/QQ/微信/抖音：点击复制号，跨设备可靠）
function copyId(id, msg){
  navigator.clipboard?.writeText(id).catch(()=>{});
  alert(msg || ('已复制：'+id));
  return false;
}

loadNotes();
loadAiNews();
