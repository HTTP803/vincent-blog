<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title id="page-title">王文彪 · 公开第二大脑</title>
<meta name="description" content="一个产品经理创业路上的公开思考集">
<script src="config.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/15.0.4/marked.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23007acc'/><stop offset='1' stop-color='%2322d3ee'/></linearGradient></defs><rect width='100' height='100' rx='22' fill='url(%23g)'/><text x='50' y='68' font-size='56' font-weight='800' font-family='Inter' fill='white' text-anchor='middle'>W</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f7fbfe; --surface:#fff;
  --b:rgba(0,0,0,.13); --b-h:rgba(0,0,0,.2);
  --fg:#000; --m:#43494d; --m2:#6b7280;
  --a:#007acc; --a-2:#22d3ee;
  --a-soft:rgba(0,122,204,.08);
  --sans:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;
  --r:16px;
  --t:.25s cubic-bezier(.4,0,.2,1);
  --sh-sm:0 1px 2px rgba(0,0,0,.04);
  --sh:0 2px 8px rgba(0,0,0,.06);
  --sh-md:0 4px 16px rgba(0,0,0,.08);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{font-size:16px;scroll-behavior:smooth;-webkit-text-size-adjust:100%}
body{font-family:var(--sans);color:var(--fg);background:var(--bg);line-height:1.6;min-height:100vh;-webkit-font-smoothing:antialiased;font-feature-settings:"cv02","cv03","cv04","cv11"}
::selection{background:var(--a);color:#fff}
a{color:var(--fg);text-decoration:none;transition:all var(--t)}
a:hover{opacity:.8}
img{max-width:100%;height:auto;border-radius:var(--r)}
hr{border:none;border-top:1px solid var(--b);margin:2rem 0}

/* Layout */
.container{max-width:1060px;margin:0 auto;padding:0 24px}

/* Section label (uppercase + tracking) */
.sec-label{font-size:.78rem;font-weight:500;text-transform:uppercase;letter-spacing:.24em;color:var(--a);margin-bottom:16px}

/* Nav */
nav{position:sticky;top:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:14px 28px;background:rgba(247,251,254,.72);backdrop-filter:saturate(180%) blur(14px);-webkit-backdrop-filter:saturate(180%) blur(14px);border-bottom:1px solid var(--b)}
.nav-logo{font-weight:700;font-size:1.05rem;color:var(--fg);cursor:pointer;display:flex;align-items:center;gap:10px;letter-spacing:-.2px}
.nav-logo::before{content:'';width:28px;height:28px;border-radius:10px;background:linear-gradient(135deg,var(--a-2),var(--a));flex-shrink:0;box-shadow:0 2px 8px rgba(0,122,204,.2)}
.nav-links{display:flex;gap:28px;font-size:.9rem}
.nav-links a{color:var(--m);transition:color var(--t);cursor:pointer;padding:4px 0;font-weight:500}
.nav-links a:hover,.nav-links a.active{color:var(--fg)}

/* Hero */
.hero{position:relative;padding:64px 24px 40px;max-width:860px;margin:0 auto}
.hero-top{display:flex;align-items:center;gap:20px;margin-bottom:22px}
.hero-avatar{width:72px;height:72px;border-radius:50%;background:linear-gradient(135deg,var(--a-2),var(--a));color:#fff;display:flex;align-items:center;justify-content:center;font-size:1.7rem;font-weight:700;flex-shrink:0;box-shadow:0 0 0 4px var(--surface),0 0 0 5px var(--b)}
.hero-text h1{font-size:2.2rem;font-weight:800;letter-spacing:-.5px;line-height:1.15;background:linear-gradient(135deg,var(--a-2),var(--a));-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
.hero-text .tagline{color:var(--m);font-size:1rem;margin-top:4px}
.hero-bio{color:var(--m2);font-size:1rem;line-height:1.65;margin-bottom:0;max-width:600px}

/* Social */
.social-row{display:flex;gap:8px;flex-wrap:wrap;margin:32px 0 0}
.social-btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:10px;font-size:.85rem;border:1px solid var(--b);background:var(--surface);color:var(--fg);cursor:pointer;transition:all var(--t);font-family:var(--sans);font-weight:500;box-shadow:var(--sh-sm);text-decoration:none}
.social-btn:hover{border-color:var(--a);color:var(--a);box-shadow:0 4px 12px rgba(0,122,204,.15);text-decoration:none;transform:translateY(-1px)}
.social-btn:hover svg{transform:scale(1.1)}
.social-btn svg{width:18px;height:18px;flex-shrink:0;transition:transform var(--t)}

/* Skills */
.skills-row{display:flex;gap:6px;flex-wrap:wrap;margin-top:20px}
.skill-pill{padding:4px 11px;border-radius:999px;font-size:.76rem;font-weight:500;background:var(--surface);color:var(--m);border:1px solid var(--b);transition:all var(--t);border-radius:var(--r)}
.skill-pill:hover{border-color:var(--b-h);color:var(--fg);transform:translateY(-1px)}

/* section title (仿 aistar 标签) */
.section-title{font-size:.76rem;font-weight:500;text-transform:uppercase;letter-spacing:.24em;color:var(--a);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.section-title::after{content:'';flex:1;height:1px;background:var(--b)}

/* Now */
.now-section{padding:48px 0;max-width:1060px;margin:0 auto}
.now-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:12px}
.now-item{display:flex;gap:10px;padding:18px 22px;background:var(--surface);border:1px solid var(--b);border-radius:var(--r);font-size:.9rem;color:var(--fg);line-height:1.55;transition:all var(--t);box-shadow:var(--sh-sm)}
.now-item:hover{box-shadow:var(--sh-md);transform:translateY(-2px);border-color:var(--b-h)}
.now-item .emoji{flex-shrink:0;width:22px;text-align:center;font-size:1rem}

/* Projects */
.projects-section{padding:48px 0;max-width:1060px;margin:0 auto}
.project-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
@media(max-width:640px){.project-grid{grid-template-columns:1fr}}
.project-card{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:24px;transition:all var(--t);cursor:default;box-shadow:var(--sh-sm)}
.project-card:hover{box-shadow:var(--sh-md);transform:translateY(-3px);border-color:var(--b-h)}
.project-card .p-title{font-size:1rem;font-weight:600;margin-bottom:6px;color:var(--fg);letter-spacing:-.1px}
.project-card .p-desc{font-size:.86rem;color:var(--m2);line-height:1.55;margin-bottom:14px}
.project-card .p-tags{display:flex;gap:6px;flex-wrap:wrap}
.project-card .p-tags span{padding:2px 8px;border-radius:999px;font-size:.7rem;background:var(--a-soft);color:var(--a);font-weight:500}

/* Notes mini */
.notes-section{padding:48px 0;max-width:1060px;margin:0 auto}
.notes-mini-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px}
.note-mini-item{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:22px;cursor:pointer;display:flex;flex-direction:column;gap:10px;transition:all var(--t);box-shadow:var(--sh-sm)}
.note-mini-item:hover{box-shadow:var(--sh-md);transform:translateY(-2px);border-color:var(--b-h)}
.nm-left{flex:1;min-width:0}
.nm-title{font-size:.96rem;font-weight:600;display:block;margin-bottom:4px;color:var(--fg);letter-spacing:-.1px}
.nm-meta{font-size:.72rem;color:var(--m2);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.nm-tags{display:flex;gap:6px;flex-wrap:wrap;margin-top:6px}
.nm-tags .tag-mini{padding:2px 8px;border-radius:999px;font-size:.68rem;background:var(--a-soft);color:var(--a);font-weight:500}
.nm-summary{font-size:.84rem;color:var(--m2);margin-top:5px;line-height:1.55}
.view-all{display:inline-flex;align-items:center;gap:6px;margin-top:18px;font-size:.86rem;color:var(--a);cursor:pointer;font-weight:600;transition:gap var(--t)}
.view-all::after{content:'→';transition:transform var(--t)}
.view-all:hover{gap:10px;color:var(--a);opacity:.8}
.view-all:hover::after{transform:translateX(3px)}

/* Contact */
.contact-section{padding:48px 0 32px;max-width:1060px;margin:0 auto}
.contact-section h2{font-size:1.4rem;font-weight:700;margin-bottom:8px;letter-spacing:-.3px}
.contact-section p{color:var(--m);font-size:.92rem;margin-bottom:20px}
.contact-section .social-btn{position:relative;font-size:.9rem;padding:11px 24px;border-color:var(--a);background:linear-gradient(135deg,var(--a-2),var(--a));color:#fff;font-weight:600;box-shadow:var(--sh);border:none}
.contact-section .social-btn::after{content:'→';margin-left:6px;transition:transform var(--t)}
.contact-section .social-btn:hover{opacity:.9;transform:translateY(-2px);box-shadow:var(--sh-md)}
.contact-section .social-btn:hover::after{transform:translateX(4px)}

/* Notes list (full page) */
.notes-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:16px}
.note-item{background:var(--surface);border:1px solid var(--b);border-radius:var(--r);padding:22px;cursor:pointer;transition:all var(--t);box-shadow:var(--sh-sm)}
.note-item:hover{box-shadow:var(--sh-md);transform:translateY(-2px);border-color:var(--b-h)}
.note-item .title{font-size:1.02rem;font-weight:600;color:var(--fg);margin-bottom:6px;letter-spacing:-.2px}
.note-item .meta{font-size:.74rem;color:var(--m2);display:flex;gap:10px;align-items:center;flex-wrap:wrap}
.note-item .tags{display:flex;gap:6px;flex-wrap:wrap}
.tag{padding:2px 8px;border-radius:999px;font-size:.7rem;background:var(--a-soft);color:var(--a);font-weight:500}
.note-item .summary{font-size:.85rem;color:var(--m2);margin-top:8px;line-height:1.6}

/* Note detail */
.note-detail{position:relative;padding:48px 0 96px;max-width:760px;margin:0 auto}
.note-detail .back{display:inline-flex;align-items:center;gap:6px;color:var(--m);font-size:.86rem;margin-bottom:32px;cursor:pointer;transition:color var(--t);font-weight:500}
.note-detail .back:hover{color:var(--fg)}
.note-detail .nd-title{font-size:2rem;font-weight:800;margin-bottom:14px;letter-spacing:-.5px;line-height:1.15}
.note-detail .meta{font-size:.76rem;color:var(--m2);margin-bottom:36px;display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding-bottom:16px;border-bottom:1px solid var(--b)}
.note-detail .content{font-size:1.05rem;line-height:1.75;color:var(--fg)}
.note-detail .content p{margin-bottom:1.2em}
.note-detail .content h2{font-size:1.4rem;font-weight:700;margin:1.8em 0 .8em;letter-spacing:-.3px;padding-top:.2em}
.note-detail .content h3{font-size:1.15rem;font-weight:600;margin:1.5em 0 .6em}
.note-detail .content ul,.note-detail .content ol{padding-left:1.5em;margin-bottom:1.2em}
.note-detail .content li{margin-bottom:.35em}
.note-detail .content blockquote{border-left:3px solid var(--a);padding:12px 20px;margin:1.3em 0;border-radius:0 var(--r) var(--r) 0;color:var(--m);background:var(--surface);border:1px solid var(--b);border-left-color:var(--a)}
.note-detail .content code{font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:.86em;background:var(--surface);padding:2px 7px;border-radius:6px;color:var(--fg);border:1px solid var(--b)}
.note-detail .content pre{background:var(--surface);padding:18px;border-radius:var(--r);overflow-x:auto;margin:1.3em 0;border:1px solid var(--b);font-size:.86rem}
.note-detail .content pre code{background:none;padding:0;display:block;color:var(--fg);border:none}
.note-detail .content a{color:var(--a);text-decoration:underline;text-underline-offset:3px;text-decoration-color:var(--b)}
.note-detail .content img{border-radius:var(--r);margin:1em 0;border:1px solid var(--b)}

/* Search & filter */
.page-header{margin-bottom:32px}
.page-header h1{font-size:1.6rem;font-weight:800;margin-bottom:6px;letter-spacing:-.3px}
.page-header .sub{color:var(--m);font-size:.86rem;margin-top:4px}
.search-wrap{position:relative;margin-bottom:14px}
.search-wrap::before{content:'⌕';position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--m);font-size:1rem;pointer-events:none}
.search-wrap input{width:100%;padding:11px 14px 11px 40px;border:1px solid var(--b);border-radius:var(--r);font-family:var(--sans);font-size:.9rem;color:var(--fg);outline:none;transition:all var(--t);background:var(--surface);box-shadow:var(--sh-sm)}
.search-wrap input::placeholder{color:var(--m)}
.search-wrap input:focus{border-color:var(--a);box-shadow:0 0 0 3px var(--a-soft),var(--sh)}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px}
.filter-bar .filter-btn{padding:5px 12px;border-radius:var(--r);font-size:.78rem;border:1px solid var(--b);background:var(--surface);color:var(--m);cursor:pointer;transition:all var(--t);font-family:var(--sans);font-weight:500;box-shadow:var(--sh-sm)}
.filter-bar .filter-btn:hover{border-color:var(--b-h);color:var(--fg);box-shadow:var(--sh)}
.filter-bar .filter-btn.active{border-color:var(--a);color:var(--a);background:var(--a-soft)}

/* About */
.about-page{position:relative;padding:48px 0 96px;max-width:760px;margin:0 auto}
.about-page .content{line-height:1.75;font-size:1.02rem;color:var(--fg)}
.about-page .content p{margin-bottom:1.2em}
.about-page h1{font-size:1.6rem;font-weight:800;margin-bottom:16px;letter-spacing:-.3px}

/* Footer */
footer{text-align:center;padding:48px 24px;color:var(--m);font-size:.8rem;margin-top:48px;border-top:1px solid var(--b)}
footer a{color:var(--m);transition:color var(--t)}
footer a:hover{color:var(--fg)}

/* Loading & empty */
.loading,.empty{text-align:center;padding:80px 24px;color:var(--m);font-size:.88rem}

/* Entrance */
#app{animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:none}}
@media(prefers-reduced-motion:reduce){#app{animation:none}}

/* Responsive */
@media(max-width:640px){
  nav{padding:12px 16px}
  .hero{padding:40px 16px 28px}
  .hero-text h1{font-size:1.6rem}
  .hero-avatar{width:56px;height:56px;font-size:1.4rem}
  .note-detail .nd-title{font-size:1.5rem}
  .note-detail{padding:28px 0 56px}
}

/* === 背景装饰 === */
.bg-deco{position:fixed;inset:0;z-index:-1;pointer-events:none;overflow:hidden}
.bg-blob{position:absolute;border-radius:50%;filter:blur(80px);opacity:.5;animation:blobFloat 20s ease-in-out infinite}
.bg-blob-1{width:520px;height:520px;top:-160px;left:-120px;background:radial-gradient(circle,rgba(34,211,238,.35),transparent 70%)}
.bg-blob-2{width:480px;height:480px;top:30%;right:-160px;background:radial-gradient(circle,rgba(0,122,204,.3),transparent 70%);animation-delay:-7s}
.bg-blob-3{width:420px;height:420px;bottom:-140px;left:30%;background:radial-gradient(circle,rgba(99,102,241,.22),transparent 70%);animation-delay:-13s}
.bg-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(0,122,204,.04) 1px,transparent 1px),linear-gradient(90deg,rgba(0,122,204,.04) 1px,transparent 1px);background-size:48px 48px;mask-image:radial-gradient(ellipse 80% 60% at 50% 30%,#000 30%,transparent 80%)}
@keyframes blobFloat{0%,100%{transform:translate(0,0) scale(1)}33%{transform:translate(40px,-30px) scale(1.05)}66%{transform:translate(-30px,30px) scale(.95)}}

/* === 装饰 SVG 组件 === */
.deco-svg{width:1em;height:1em;display:inline-block;vertical-align:-.15em}

/* === Section 标题加图标 === */
.section-title{display:flex;align-items:center;gap:10px;font-size:.78rem;font-weight:700;text-transform:uppercase;letter-spacing:.24em;color:var(--a);margin-bottom:24px}
.section-title svg{width:18px;height:18px;color:var(--a)}
.section-title::after{content:'';flex:1;height:1px;background:linear-gradient(90deg,var(--b),transparent)}

/* === 项目封面 === */
.p-cover{height:140px;border-radius:12px 12px 0 0;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;margin:-20px -20px 16px}
.p-cover svg{width:60%;height:60%;opacity:.85;transition:transform .5s ease}
.project-card:hover .p-cover svg{transform:scale(1.1) rotate(-3deg)}
.p-cover.c1{background:linear-gradient(135deg,#007acc,#22d3ee)}
.p-cover.c2{background:linear-gradient(135deg,#6366f1,#a855f7)}
.p-cover.c3{background:linear-gradient(135deg,#22d3ee,#10b981)}
.p-cover.c4{background:linear-gradient(135deg,#f59e0b,#ef4444)}
.p-cover.c5{background:linear-gradient(135deg,#ec4899,#8b5cf6)}

/* === 笔记卡片封面 === */
.nm-cover{width:88px;height:88px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--a-2),var(--a));box-shadow:0 2px 8px rgba(0,122,204,.15)}
.nm-cover svg{width:48px;height:48px;color:#fff;opacity:.9}
.note-mini-item:hover .nm-cover{transform:scale(1.05) rotate(-2deg);transition:transform .3s ease}

/* === Hero 装饰 === */
.hero-avatar{position:relative}
.hero-avatar::before{content:'';position:absolute;inset:-8px;border-radius:50%;background:conic-gradient(from 0deg,var(--a),var(--a-2),var(--a));z-index:-1;opacity:.4;filter:blur(8px);animation:spin 8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* === 笔记详情装饰 === */
.note-detail .content h2{display:flex;align-items:center;gap:10px;padding-bottom:8px;border-bottom:1px solid var(--b);margin-top:2.5em}
.note-detail .content h2::before{content:'';width:6px;height:18px;background:linear-gradient(180deg,var(--a),var(--a-2));border-radius:3px}

/* === 按钮加 SVG 箭头 === */
.cta-btn{display:inline-flex;align-items:center;gap:8px;padding:11px 24px;border-radius:10px;background:linear-gradient(135deg,var(--a),var(--a-2));color:#fff;font-weight:600;font-size:.92rem;text-decoration:none;box-shadow:0 4px 14px rgba(0,122,204,.3);transition:all .3s ease}
.cta-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(0,122,204,.45)}
.cta-btn svg{width:16px;height:16px;transition:transform .3s ease}
.cta-btn:hover svg{transform:translateX(3px)}

</style>
</head>
<body>

<nav>
  <div class="nav-logo" onclick="return showView('home')" style="cursor:pointer">王文彪 · 第二大脑</div>
  <div class="nav-links">
    <a onclick="return showView('home')" id="nav-home" class="active">首页</a>
    <a onclick="return showView('notes')" id="nav-notes">笔记</a>
    <a onclick="return showView('about')" id="nav-about">关于</a>
  </div>
</nav>

<div id="app">
  <div class="loading">加载中...</div>
</div>

<footer>
  <p>© <span id="footer-year"></span> 王文彪 · 用 Obsidian 书写，用思考连接</p>
</footer>

<script>
// --- Site Context ---
const C = {
  notes: [],
  allTags: [],
  currentView: 'home',
  currentTag: null,
  searchQuery: '',
  cfg: typeof SITE_CONFIG !== 'undefined' ? SITE_CONFIG : {},
};
// Sync title from config
if (C.cfg.title) document.title = C.cfg.title;
const CDN_MARKED = typeof marked !== 'undefined';

// --- Navigation ---
function showView(view, data) {
  C.currentView = view;
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const m = { home:'nav-home', notes:'nav-notes', about:'nav-about', note:'nav-notes' };
  const el = document.getElementById(m[view]);
  if (el) el.classList.add('active');
  if (view === 'home') renderHome();
  else if (view === 'notes') renderNotesList();
  else if (view === 'note') renderNote(data);
  else if (view === 'about') renderAbout();
  return false;
}

// --- Markdown ---
function parseMD(text) {
  const meta = {};
  const body = text.replace(/^---\n([\s\S]*?)\n---\n?/, (_, fm) => {
    fm.split('\n').forEach(l => { const m=l.match(/^(\w+):\s*(.+)/); if(m) meta[m[1].trim()]=m[2].trim(); });
    return '';
  });
  if (meta.tags) meta.tags = meta.tags.split(/[,，\s]+/).filter(Boolean);
  else meta.tags = [];
  meta.title = meta.title || '无标题';
  const html = CDN_MARKED ? marked.parse(body) : '<p>'+body.replace(/\n/g,'<br>')+'</p>';
  return { meta, html, body };
}

// --- Load Notes ---
async function loadNotes() {
  try {
    const r = await fetch(C.cfg.contentDir+'/index.json');
    if (!r.ok) throw Error('no index');
    const files = await r.json();
    C.notes = [];
    for (const f of files) {
      const res = await fetch(C.cfg.contentDir+'/'+f.file);
      if (!res.ok) continue;
      const raw = await res.text();
      const { meta, html, body } = parseMD(raw);
      if (meta.draft === 'true') continue;
      const summary = body.replace(/[#*`\[\]]/g,'').trim().slice(0,120);
      C.notes.push({ file: f.file, meta, html, summary });
    }
    C.notes.sort((a,b) => (a.meta.date||'').localeCompare(b.meta.date||'') * -1);
    const s = new Set();
    C.notes.forEach(n => n.meta.tags.forEach(t => s.add(t)));
    C.allTags = [...s].sort();
    renderHome();
    setupHash();
  } catch(e) {
    document.getElementById('app').innerHTML =
      '<div class="empty">还没有笔记。把 .md 放进 content/，然后跑：<br><code style="font-size:0.85rem">python3 build-index.py</code></div>';
  }
}

function setupHash() {
  const h = location.hash.slice(1);
  if (h.startsWith('note=')) {
    const file = decodeURIComponent(h.slice(5));
    const note = C.notes.find(n => n.file === file);
    if (note) showView('note', note);
  } else if (h === 'about') showView('about');
  else if (h === 'notes') showView('notes');
}

function setHash(h) { history.pushState(null, '', '#' + h); }

function renderHome() {

    : `<div class="hero-avatar">${cfg.author[0]}</div>`;

  // mailto 唤起邮件；有 id（如微信）点击复制账号；qr 指向本地二维码图片；其余外链新标签打开
  const socialBtns = Object.entries(cfg.social).filter(([,v]) => v.url || v.qr || v.id).map(([k,v]) => {
    if (v.id && !v.url && !v.qr)
      return `<a class="social-btn" href="#" onclick="return copyId('${v.id}','${v.label}')">${SOCIAL_ICONS[k]||''}<span>${v.label}</span></a>`;
    const href = v.url || v.qr;
    const blank = href.startsWith('mailto:') ? '' : ' target="_blank" rel="noopener"';
    return `<a class="social-btn" href="${href}"${blank}>${SOCIAL_ICONS[k]||''}<span>${v.label}</span></a>`;
  }).join('');

  // Skills
  const skills = (cfg.skills||[]).map(s => `<span class="skill-pill">${s}</span>`).join('');

  // Now
  const nowItems = (cfg.now||[]).map(item =>
    `<li class="now-item"><span class="emoji">${item.emoji||'•'}</span><span>${item.text}</span></li>`
  ).join('');

  setHash('');

// --- Render: Notes List ---
function renderNotesList() {
  const app = document.getElementById('app');
  let filtered = [...C.notes];
  if (C.currentTag) filtered = filtered.filter(n => n.meta.tags.includes(C.currentTag));
  if (C.searchQuery) {
    const q = C.searchQuery.toLowerCase();
    filtered = filtered.filter(n =>
      n.meta.title.toLowerCase().includes(q) || n.summary.toLowerCase().includes(q) ||
      n.meta.tags.some(t => t.toLowerCase().includes(q))
    );
  }

  const tagBtns = C.allTags.map(t =>
    `<button class="filter-btn${C.currentTag===t?' active':''}" onclick="toggleTag('${t}')">${t}</button>`
  ).join('');
  const clearBtn = C.currentTag ? `<button class="filter-btn" onclick="toggleTag(null)" style="color:var(--p)">× 清除</button>` : '';

  const items = filtered.length ? filtered.map(n => {
    const tags = n.meta.tags.map(t => `<span class="tag">${t}</span>`).join(' ');
    return `<li class="note-item" onclick="return showView('note', notes.find(x=>x.file==='${n.file}'))">
      <div class="title">${escHtml(n.meta.title)}</div>
      <div class="meta"><span>${n.meta.date||''}</span>${tags ? '<span class="tags">'+tags+'</span>' : ''}</div>
      <div class="summary">${escHtml(n.summary)}${n.summary.length>=120?'...':''}</div>
    </li>`;
  }).join('') : '<div class="empty">没有匹配的笔记</div>';

  app.innerHTML = `<div class="container" style="padding-top:40px;padding-bottom:80px">
    <div class="page-header">
      <h1>全部笔记</h1>
      <div class="sub">共 ${C.notes.length} 篇${C.currentTag ? ' · 筛选: '+C.currentTag : ''}</div>
    </div>
    <div class="search-wrap"><input id="search-input" placeholder="搜索笔记..." value="${escHtml(C.searchQuery)}" oninput="onSearch(this.value)"></div>
    ${tagBtns || clearBtn ? `<div class="filter-bar">${tagBtns} ${clearBtn}</div>` : ''}
    <ul class="notes-list">${items}</ul>
  </div>`;
  document.getElementById('search-input')?.focus();
  setHash('notes');
}

function toggleTag(tag) {
  C.currentTag = (C.currentTag === tag) ? null : tag;
  if (C.currentView === 'notes') renderNotesList();
  else renderHome();
}

function onSearch(q) {
  C.searchQuery = q;
  renderNotesList();
}

// --- Render: Note Detail ---
function renderNote(note) {
  if (!note) return showView('notes');
  const app = document.getElementById('app');
  const tags = note.meta.tags.map(t => `<span class="tag">${t}</span>`).join(' ');
  app.innerHTML = `<div class="container">
    <div class="note-detail">
      <a class="back" onclick="return showView('notes')">← 返回笔记列表</a>
      <div class="nd-title">${escHtml(note.meta.title)}</div>
      <div class="meta"><span>${note.meta.date||''}</span>${tags ? '<span class="tags">'+tags+'</span>' : ''}</div>
      <div class="content">${note.html}</div>
    </div>
  </div>`;
  setHash('note='+encodeURIComponent(note.file));
  window.scrollTo(0, 0);
}

// --- Render: About ---
function renderAbout() {
  const app = document.getElementById('app');
  app.innerHTML = `<div class="container">
    <div class="about-page">
      <h1 style="font-size:1.3rem;font-weight:500;margin-bottom:8px">关于我</h1>
      <div class="content" id="about-content"><p style="color:var(--m)">加载中...</p></div>
    </div>
  </div>`;
  setHash('about');
  fetch(C.cfg.contentDir+'/about.md').then(r=>r.text()).then(raw => {
    const { html } = parseMD(raw);
    document.getElementById('about-content').innerHTML = html;
  }).catch(() => {
    document.getElementById('about-content').innerHTML =
      '<p>王文彪，产品经理，正在创业。</p><p>这个站是我的公开第二大脑。</p>';
  });
}

// --- Util ---
function escHtml(s) {
  if (!s) return '';
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// --- Init ---
document.getElementById('footer-year').textContent = new Date().getFullYear();
const notes = []; // for inline onclick references
Object.defineProperty(window, 'notes', { get: () => C.notes });

// 复制账号（微信等无网页地址的平台）
function copyId(id, label){
  navigator.clipboard?.writeText(id).catch(()=>{});
  alert(`${label}号已复制：${id}\n打开${label}搜索添加即可`);
  return false;
}
