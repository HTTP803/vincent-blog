<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>AI 速报 长图</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+SC:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#07090d;font-family:'Inter','Noto Sans SC',-apple-system,BlinkMacSystemFont,sans-serif;color:#eef0f9;width:1080px;margin:0 auto}
.wrap{padding:60px 56px 64px}
.header{background:linear-gradient(135deg,#bc52ee,#3245ff);border-radius:24px;padding:40px 44px;display:flex;align-items:center;gap:26px;box-shadow:0 18px 50px rgba(80,60,220,.35)}
.header .logo{flex-shrink:0;filter:drop-shadow(0 4px 14px rgba(0,0,0,.35))}
.header .ht{font-size:1.0rem;font-family:'JetBrains Mono',monospace;letter-spacing:.16em;text-transform:uppercase;opacity:.92}
.header h1{font-size:2.5rem;font-weight:800;letter-spacing:-.5px;margin:6px 0 8px;color:#fff}
.header .hs{font-size:1.05rem;opacity:.92}
.d-section{margin-top:38px}
.sec-head{display:flex;align-items:center;gap:14px;margin-bottom:18px}
.sec-bar{width:7px;height:32px;border-radius:5px}
.sec-title{font-size:30px;font-weight:800;letter-spacing:-.3px}
.sec-line{flex:1;height:1px;background:rgba(255,255,255,.14)}
.sec-summary{background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.12);border-left:5px solid var(--c);border-radius:14px;padding:22px 26px;font-size:19px;line-height:1.78;color:#c3cadd;margin-bottom:16px}
.item{background:rgba(255,255,255,.045);border:1px solid rgba(255,255,255,.10);border-left:5px solid var(--c);border-radius:18px;padding:24px 28px;margin-bottom:16px}
.item h3{font-size:23px;font-weight:700;margin-bottom:10px;letter-spacing:-.2px}
.item p{font-size:18px;line-height:1.72;color:#aeb6c9}
.item .src{margin-top:13px;font-size:14px;color:#6b7aab;font-family:'JetBrains Mono',monospace}
.item .src a{color:#4bf3c8;text-decoration:none}
.footer{margin-top:46px;padding-top:26px;border-top:1px solid rgba(255,255,255,.12);display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;color:#7d87a3;font-size:15px;font-family:'JetBrains Mono',monospace}
.footer .wm{color:#9aa3b8}
</style>
</head>
<body>
<div class="wrap">
  <div class="header">
    <svg class="logo" viewBox="0 0 64 64" width="76" height="76" aria-hidden="true"><defs><linearGradient id="lg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#fff" stop-opacity=".25"/><stop offset="1" stop-color="#fff" stop-opacity=".05"/></linearGradient></defs><rect width="64" height="64" rx="18" fill="url(#lg)" stroke="#fff" stroke-opacity=".5"/><path d="M18 42 L32 22 L46 42" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/><circle cx="32" cy="22" r="4.5" fill="#4bf3c8"/></svg>
    <div>
      <div class="ht" id="img-brand"></div>
      <h1 id="img-title"></h1>
      <div class="hs" id="img-sub"></div>
    </div>
  </div>
  <div id="img-sections"></div>
  <div class="footer">
    <span class="wm" id="img-brand2"></span>
    <span id="img-wechat"></span>
  </div>
</div>

"Sand.ai 获超亿美元融资，将发开源 MoE 视频模型", "url": "https://www.web3the.com/fast/779247.html", "source": "雷电财经", "date": "2026-07-20"}}]}, {"key": "product", "label": "产品工具", "color": "#4bf3c8", "summary": "", "items": [{"title": "阿里云发布 AgentTeams 与 AgentLoop", "summary": "阿里云推出多智能体协作治理平台 AgentTeams 与智能体观测优化平台 AgentLoop，分别解决企业 Agent 规模化落地「怎么配合」与「怎么越用越好」两大难题，目前已全面公测。", "source": {"title": "阿里云发布 AgentTeams 与 AgentLoop", "url": "https://www.toutiao.com/article/7660451853372506687/", "source": "阿里云（云原生）", "date": "2026-07-09"}}, {"title": "金山办公发布 灵犀专业版 与 WPS Comate", "summary": "金山办公同日发布面向个人的「灵犀专业版」与组织级「WPS Comate」，AI 从「生成内容」迈向「交付可编辑成果」，落地「企业大脑」，办公软件进入智能体协作时代。", "source": {"title": "金山办公发布 灵犀专业版 与 WPS Comate", "url": "https://www.toutiao.com/article/7663069227812684328/", "source": "三湘都市报", "date": "2026-07-16"}}, {"title": "Meta 发布自研图像生成模型 Muse Image", "summary": "Meta 推出首款图像生成类产品 Muse Image，已接入 Meta AI / Instagram / WhatsApp，支持画面内清晰文字渲染与可扫码二维码生成，数亿社交用户无需跳转即可调用。", "source": {"title": "Meta 发布自研图像生成模型 Muse Image", "url": "https://www.163.com/dy/article/L1AI08H00514R9OJ.html", "source": "环球网", "date": "2026-07-08"}}]}, {"key": "tutorial", "label": "技巧教程", "color": "#f59e0b", "summary": "", "items": [{"title": "OpenAI 官方 Prompting 指南：从「教过程」转向「说结果」", "summary": "OpenAI 发布面向普通用户的提示词指南，强调先写清期望结果而非逐步列流程；官方测试显示精简指令后 Eval 分数 +10~15%、Token 消耗降 41~66%。约束（1-2 条硬规则）优于冗长步骤。", "source": {"title": "OpenAI 官方 Prompting 指南：从「教过程」转向「说结果」", "url": "https://www.newmobilelife.com/2026/07/14/openai-prompt-guide-start-from-results/", "source": "newmobilelife", "date": "2026-07-14"}}, {"title": "腾讯云《Codex-最佳实践》：把 AI 当队友调教", "summary": "腾讯云开发者社区给出可落地的 Codex 用法：AGENTS.md 项目说明书该写什么、提示「目标+上下文+约束+验收」四件套、权限按场景分档、复杂任务先出计划再动手。", "source": {"title": "腾讯云《Codex-最佳实践》：把 AI 当队友调教", "url": "https://cloud.tencent.com/developer/article/2708582", "source": "腾讯云开发者社区", "date": "2026-07-06"}}]}, {"key": "industry", "label": "行业资讯", "color": "#3245ff", "summary": "", "items": [{"title": "欧盟依《数字市场法》强拆 Google AI 分发壁垒", "summary": "欧盟委员会要求 Google 开放 Android 给竞品 AI 助手，并自 2027 年起向 AI 开发商共享搜索数据。直接拆掉 Google 在数十亿台设备上的默认入口与二十年搜索行为数据壁垒。", "source": {"title": "欧盟依《数字市场法》强拆 Google AI 分发壁垒", "url": "https://www.buildfastwithai.com/blogs/ai-news-today-july-20-2026-16-biggest-stories", "source": "BuildFastWithAI", "date": "2026-07-20"}}, {"title": "美国 125+ 地爆发反对 AI 数据中心建设", "summary": "全美 125+ 地点爆发反对 AI 数据中心建设的全国性协调行动，批评其推高电价、耗水污染；超 1300 亿美元相关项目已被延期或取消，基建扩张面临社区与监管双重压力。", "source": {"title": "美国 125+ 地爆发反对 AI 数据中心建设", "url": "https://new.qq.com/rain/a/20260720A02G4M00?refer=cp_1009", "source": "腾讯新闻", "date": "2026-07-20"}}, {"title": "高盛：Token 价格 30 个月跌超 90%", "summary": "高盛数据显示主流 LLM 每百万 Token 价格指数较 2022 年初降逾 90%；预计 2026 年全球超大规模云 AI 资本开支达 7570 亿美元，成本曲线下探加速 Agent 规模化。", "source": {"title": "高盛：Token 价格 30 个月跌超 90%", "url": "https://new.qq.com/rain/a/20260720A02G4M00?refer=cp_1009", "source": "腾讯新闻", "date": "2026-07-20"}}]}]};
document.getElementById('img-brand').textContent = DIGEST.meta.brand;
document.getElementById('img-title').textContent = DIGEST.meta.issue ? ('第 '+DIGEST.meta.issue+' 期 · AI 行业日报') : 'AI 行业日报';
document.getElementById('img-sub').textContent = DIGEST.meta.date + ' · ' + DIGEST.meta.subtitle;
document.getElementById('img-brand2').textContent = DIGEST.meta.brand;
document.getElementById('img-wechat').textContent = '微信号 ' + DIGEST.meta.wechat + ' · 每日更新';
const box = document.getElementById('img-sections');
DIGEST.sections.forEach(s=>{
  const sec = document.createElement('section');
  sec.className = 'd-section';
  const head = document.createElement('div');
  head.className = 'sec-head';
  head.innerHTML = '<span class="sec-bar" style="background:'+s.color+'"></span><span class="sec-title">'+s.label+'</span><span class="sec-line"></span>';
  sec.appendChild(head);
  if (s.summary) { const p = document.createElement('p'); p.className='sec-summary'; p.style.setProperty('--c', s.color); p.textContent = s.summary; sec.appendChild(p); }
  s.items.forEach(it=>{
    const a = document.createElement('div');
    a.className = 'item';
    a.style.setProperty('--c', s.color);
    const link = it.source.url ? ' · <a href="'+it.source.url+'">原文↗</a>' : '';
    a.innerHTML = '<h3>'+it.title+'</h3><p>'+it.summary+'</p><div class="src">来源：'+it.source.source+' · '+it.source.date+link+'</div>';
    sec.appendChild(a);
  });
  box.appendChild(sec);
});
</script>
</body>
</html>
